<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="#4338ca"/>

  <!-- Book body -->
  <rect x="96" y="290" width="320" height="140" rx="18" fill="#e0e7ff"/>
  <!-- Book spine line -->
  <line x1="96" y1="360" x2="416" y2="360" stroke="#a5b4fc" stroke-width="4"/>
  <!-- Book pages edge -->
  <rect x="110" y="296" width="292" height="6" rx="3" fill="#c7d2fe"/>

  <!-- Wizard hat -->
  <path d="M256 56 L188 268 L324 268 Z" fill="#6d28d9"/>
  <!-- Hat brim -->
  <ellipse cx="256" cy="272" rx="100" ry="26" fill="#7c3aed"/>
  <!-- Hat band -->
  <rect x="184" y="248" width="144" height="20" rx="4" fill="#fbbf24"/>
  <!-- Band buckle -->
  <rect x="240" y="244" width="32" height="28" rx="4" fill="#f59e0b" stroke="#d97706" stroke-width="2"/>
  <rect x="248" y="250" width="16" height="16" rx="2" fill="#fbbf24"/>

  <!-- Stars / sparkles -->
  <path d="M380 100 l6 18 18 6-18 6-6 18-6-18-18-6 18-6z" fill="#fbbf24"/>
  <path d="M140 160 l4 12 12 4-12 4-4 12-4-12-12-4 12-4z" fill="#fbbf24" opacity="0.7"/>
  <path d="M400 200 l3 9 9 3-9 3-3 9-3-9-9-3 9-3z" fill="#fbbf24" opacity="0.5"/>

  <!-- Book title lines (decorative) -->
  <rect x="180" y="320" width="152" height="8" rx="4" fill="#818cf8"/>
  <rect x="204" y="338" width="104" height="6" rx="3" fill="#a5b4fc"/>

  <!-- Book bottom edge (depth) -->
  <path d="M96 412 Q96 430 114 430 L398 430 Q416 430 416 412" fill="none" stroke="#a5b4fc" stroke-width="4"/>
</svg>